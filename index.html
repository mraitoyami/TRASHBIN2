<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern Knight</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">2D Pixel RPG</p>
      <h1>Lantern Knight</h1>
      <p class="copy">Clear the dungeon, collect crystals, and survive inside a limited field of view.</p>

      <div class="stats">
        <div class="stat">
          <span>Health</span>
          <strong id="healthText">100 / 100</strong>
        </div>
        <div class="stat">
          <span>Crystals</span>
          <strong id="crystalText">0 / 3</strong>
        </div>
        <div class="stat">
          <span>Enemies</span>
          <strong id="enemyText">0</strong>
        </div>
      </div>

      <div class="controls">
        <p><kbd>WASD</kbd> move</p>
        <p><kbd>Space</kbd> attack</p>
        <p><kbd>Shift</kbd> sprint</p>
        <p><kbd>R</kbd> restart</p>
      </div>

      <p class="message" id="messageText">Find three crystals and defeat every shadow.</p>
    </section>

    <section class="game-wrap">
      <canvas id="game" width="960" height="640" aria-label="Lantern Knight game"></canvas>
      <div class="overlay hidden" id="overlay">
        <div class="overlay-card">
          <h2 id="overlayTitle">You fell in the dark.</h2>
          <p id="overlayText">Press R to try again.</p>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
