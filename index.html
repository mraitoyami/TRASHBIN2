<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eco Survival 3D</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="crosshair" aria-hidden="true"></div>

    <div id="hud">
      <div class="bar-row">
        <span>Health</span>
        <div class="bar"><div id="healthFill" class="fill health"></div></div>
        <span id="healthText">100</span>
      </div>
      <div class="bar-row">
        <span>Fire Rate</span>
        <div class="bar"><div id="fireRateFill" class="fill fire"></div></div>
        <span id="fireRateText">1.00x</span>
      </div>
      <div class="bar-row">
        <span>Oxygen</span>
        <div class="bar"><div id="oxygenFill" class="fill oxygen"></div></div>
        <span id="oxygenText">50</span>
      </div>
      <div class="bar-row">
        <span>Pollution</span>
        <div class="bar"><div id="pollutionFill" class="fill pollution"></div></div>
        <span id="pollutionText">50</span>
      </div>
    </div>

    <div id="status">Press E near trees, bins, or animals.</div>

    <script type="module" src="./game.js"></script>
  </body>
</html>
